name: Video Processing Automation Pipeline

on:
  workflow_dispatch: # Manual trigger via GitHub Actions UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    # Added a generous timeout since video downloading/uploading can take time
    timeout-minutes: 360 

    steps:
    - name: Checkout Repository Contents
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip' # Speeds up subsequent runs by caching dependencies

    - name: Install System Dependencies (FFmpeg & Python Libraries)
      run: |
        sudo apt-get update -qq
        sudo apt-get install -qq ffmpeg
        python -m pip install --upgrade pip
        # Removed yt-dlp since your new code relies entirely on ffmpeg
        pip install google-api-python-client google-auth requests

    - name: Run Automation Pipeline Engine
      env:
        VIDARA_API_KEY: ${{ secrets.VIDARA_API_KEY }}
        GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      run: python pipeline.py
